document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9845a252-10d8-4d99-9c58-5c763a8caea6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d9a02915-a212-45b0-b5da-91bde4befa99\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* Aura color tokens\n   Source of truth: src/cli/display.ts + src/cli/diamond.ts (terminal palette,\n   the \"true\" voice of the product) and site/index.html (marketing site).\n   The CLI's terracotta (#cc785c) and the site's terracotta (#c2674c) are the\n   same family — the two surfaces already agree. */\n\n:root {\n  /* ---- base neutrals ---- */\n  --aura-black: #0c1322;        /* site background — deep ink navy */\n  --aura-black-warm: #1a1a1a;   /* CLI/terminal true-black surface */\n  --aura-surface-1: #101a2c;    /* raised panel on navy (rowlist, term) */\n  --aura-surface-2: #0a1020;    /* deepest recessed panel (terminal, install box) */\n  --aura-border: #4e3d30;       /* warm hairline border (CLI boxes) */\n  --aura-border-navy: rgba(110, 208, 234, 0.16); /* cool hairline border (site) */\n\n  /* ---- cream / text-on-dark ---- */\n  --aura-cream-100: #f3ece4;    /* brightest heading cream */\n  --aura-cream-200: #ede0cc;    /* CLI stream text */\n  --aura-cream-300: #eaf1f7;    /* site body text (cooler cream) */\n  --aura-cream-muted: #c8b5a0;  /* muted cream, secondary CLI text */\n  --aura-taupe: #8a7768;        /* tertiary text, tool detail text */\n  --aura-slate: #aebccd;        /* site body copy on navy */\n  --aura-slate-dim: #73849a;    /* site tertiary / stat labels */\n  --aura-slate-dimmer: #56657a; /* footer, scroll hint */\n\n  /* ---- primary accent: terracotta ---- */\n  --aura-terracotta: #cc785c;      /* CLI accent — tool names, headers */\n  --aura-terracotta-site: #c2674c; /* site accent — buttons, section bg */\n  --aura-terracotta-deep: #411e13; /* text-on-terracotta (dark) */\n  --aura-terracotta-ink: #2a140d;  /* headings on terracotta sections */\n\n  /* ---- secondary accent: cyan (site-only, \"tech\" accent) ---- */\n  --aura-cyan: #6ed0ea;\n  --aura-cyan-dim: #9fdcec;\n\n  /* ---- ruby + gold: the diamond/crown motif (from renderDiamond ascii art) ---- */\n  --aura-ruby: #9b1b30;\n  --aura-gold: #c9a84c;\n\n  /* ---- semantic status ---- */\n  --aura-success: #5a9e6e;\n  --aura-success-bright: #7fcf95;\n  --aura-warning: #d4903a;\n  --aura-error: #b15439;\n\n  /* ---- semantic aliases ---- */\n  --surface-page: var(--aura-black);\n  --surface-page-warm: var(--aura-black-warm);\n  --surface-card: var(--aura-surface-1);\n  --surface-recessed: var(--aura-surface-2);\n  --border-default: var(--aura-border-navy);\n  --border-warm: var(--aura-border);\n\n  --text-heading: var(--aura-cream-100);\n  --text-body: var(--aura-slate);\n  --text-body-warm: var(--aura-cream-200);\n  --text-muted: var(--aura-slate-dim);\n  --text-muted-warm: var(--aura-taupe);\n\n  --accent-primary: var(--aura-terracotta-site);\n  --accent-primary-cli: var(--aura-terracotta);\n  --accent-secondary: var(--aura-cyan);\n\n  --status-success: var(--aura-success);\n  --status-warning: var(--aura-warning);\n  --status-error: var(--aura-error);\n}\n<\u002Fstyle>\n  <style>/* Aura type tokens — three families, each with one job. Never mixed within\n   the same text element. Source: site/index.html font stack + CLI monospace\n   conventions (chalk/box-drawing output is always monospace). */\n\n:root {\n  --font-serif-display: 'Cormorant Garamond', Georgia, serif;   /* headlines, taglines — always light/medium weight, often italic for voice lines */\n  --font-mono: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;  /* labels, kickers, code, terminal, stats, nav */\n  --font-sans: 'Space Grotesk', system-ui, sans-serif;           /* body copy, UI chrome */\n\n  /* display serif scale — clamp() fluid sizes matching the live site */\n  --text-display-xl: clamp(3rem, 7vw, 6.2rem);\n  --text-display-lg: clamp(2.1rem, 4.6vw, 3.4rem);\n  --text-display-md: clamp(1.4rem, 2.6vw, 2.1rem);\n\n  /* mono scale */\n  --text-mono-label: 0.72rem;   /* kickers, section labels — always uppercase, wide tracking */\n  --text-mono-body: 0.84rem;\n  --text-mono-lg: 0.96rem;\n\n  /* sans scale */\n  --text-body-md: 1.08rem;\n  --text-body-sm: 0.92rem;\n\n  --tracking-label: 0.3em;   /* section kickers: \"01 — IDENTITY\" */\n  --tracking-nav: 0.06em;\n  --tracking-tight: 0.01em;\n\n  --leading-body: 1.65;\n  --leading-tight: 0.96;     /* display headlines */\n  --leading-display: 1.14;\n}\n<\u002Fstyle>\n  <style>/* Aura spacing + shape tokens. The live site uses vw-based section padding\n   and small consistent radii (6-14px) — no large rounded-corner cards. */\n\n:root {\n  --space-1: 0.25rem;\n  --space-2: 0.5rem;\n  --space-3: 0.75rem;\n  --space-4: 1rem;\n  --space-5: 1.5rem;\n  --space-6: 2rem;\n  --space-7: 2.6rem;\n  --space-8: 3.5rem;\n  --space-9: 5rem;\n\n  --section-pad-y: 7rem;\n  --section-pad-x: 7vw;\n\n  --radius-sm: 6px;   /* buttons, install box */\n  --radius-md: 10px;  /* rowlist container */\n  --radius-lg: 12px;  /* terminal, status card */\n  --radius-xl: 14px;  /* grid3 container */\n\n  --shadow-terminal: inset 0 0 0 1px rgba(110, 208, 234, 0.16);\n}\n<\u002Fstyle>\n  <style>/* Aura type system — all three families are Google Fonts, loaded verbatim\n   from the live marketing site (site/index.html) a U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d9a02915-a212-45b0-b5da-91bde4befa99\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Aura color tokens\n   Source of truth: src/cli/display.ts + src/cli/diamond.ts (terminal palette,\n   the \"true\" voice of the product) and site/index.html (marketing site).\n   The CLI's terracotta (#cc785c) and the site's terracotta (#c2674c) are the\n   same family — the two surfaces already agree. */\n\n:root {\n  /* ---- base neutrals ---- */\n  --aura-black: #0c1322;        /* site background — deep ink navy */\n  --aura-black-warm: #1a1a1a;   /* CLI/terminal true-black surface */\n  --aura-surface-1: #101a2c;    /* raised panel on navy (rowlist, term) */\n  --aura-surface-2: #0a1020;    /* deepest recessed panel (terminal, install box) */\n  --aura-border: #4e3d30;       /* warm hairline border (CLI boxes) */\n  --aura-border-navy: rgba(110, 208, 234, 0.16); /* cool hairline border (site) */\n\n  /* ---- cream / text-on-dark ---- */\n  --aura-cream-100: #f3ece4;    /* brightest heading cream */\n  --aura-cream-200: #ede0cc;    /* CLI stream text */\n  --aura-cream-300: #eaf1f7;    /* site body text (cooler cream) */\n  --aura-cream-muted: #c8b5a0;  /* muted cream, secondary CLI text */\n  --aura-taupe: #8a7768;        /* tertiary text, tool detail text */\n  --aura-slate: #aebccd;        /* site body copy on navy */\n  --aura-slate-dim: #73849a;    /* site tertiary / stat labels */\n  --aura-slate-dimmer: #56657a; /* footer, scroll hint */\n\n  /* ---- primary accent: terracotta ---- */\n  --aura-terracotta: #cc785c;      /* CLI accent — tool names, headers */\n  --aura-terracotta-site: #c2674c; /* site accent — buttons, section bg */\n  --aura-terracotta-deep: #411e13; /* text-on-terracotta (dark) */\n  --aura-terracotta-ink: #2a140d;  /* headings on terracotta sections */\n\n  /* ---- secondary accent: cyan (site-only, \"tech\" accent) ---- */\n  --aura-cyan: #6ed0ea;\n  --aura-cyan-dim: #9fdcec;\n\n  /* ---- ruby + gold: the diamond/crown motif (from renderDiamond ascii art) ---- */\n  --aura-ruby: #9b1b30;\n  --aura-gold: #c9a84c;\n\n  /* ---- semantic status ---- */\n  --aura-success: #5a9e6e;\n  --aura-success-bright: #7fcf95;\n  --aura-warning: #d4903a;\n  --aura-error: #b15439;\n\n  /* ---- semantic aliases ---- */\n  --surface-page: var(--aura-black);\n  --surface-page-warm: var(--aura-black-warm);\n  --surface-card: var(--aura-surface-1);\n  --surface-recessed: var(--aura-surface-2);\n  --border-default: var(--aura-border-navy);\n  --border-warm: var(--aura-border);\n\n  --text-heading: var(--aura-cream-100);\n  --text-body: var(--aura-slate);\n  --text-body-warm: var(--aura-cream-200);\n  --text-muted: var(--aura-slate-dim);\n  --text-muted-warm: var(--aura-taupe);\n\n  --accent-primary: var(--aura-terracotta-site);\n  --accent-primary-cli: var(--aura-terracotta);\n  --accent-secondary: var(--aura-cyan);\n\n  --status-success: var(--aura-success);\n  --status-warning: var(--aura-warning);\n  --status-error: var(--aura-error);\n}\n\n/* Aura type tokens — three families, each with one job. Never mixed within\n   the same text element. Source: site/index.html font stack + CLI monospace\n   conventions (chalk/box-drawing output is always monospace). */\n\n:root {\n  --font-serif-display: 'Cormorant Garamond', Georgia, serif;   /* headlines, taglines — always light/medium weight, often italic for voice lines */\n  --font-mono: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;  /* labels, kickers, code, terminal, stats, nav */\n  --font-sans: 'Space Grotesk', system-ui, sans-serif;           /* body copy, UI chrome */\n\n  /* display serif scale — clamp() fluid sizes matching the live site */\n  --text-display-xl: clamp(3rem, 7vw, 6.2rem);\n  --text-display-lg: clamp(2.1rem, 4.6vw, 3.4rem);\n  --text-display-md: clamp(1.4rem, 2.6vw, 2.1rem);\n\n  /* mono scale */\n  --text-mono-label: 0.72rem;   /* kickers, section labels — always uppercase, wide tracking */\n  --text-mono-body: 0.84rem;\n  --text-mono-lg: 0.96rem;\n\n  /* sans scale */\n  --text-body-md: 1.08rem;\n  --text-body-sm: 0.92rem;\n\n  --tracking-label: 0.3em;   /* section kickers: \"01 — IDENTITY\" */\n  --tracking-nav: 0.06em;\n  --tracking-tight: 0.01em;\n\n  --leading-body: 1.65;\n  --leading-tight: 0.96;     /* display headlines */\n  --leading-display: 1.14;\n}\n\n/* Aura spacing + shape tokens. The live site uses vw-based section padding\n   and small consistent radii (6-14px) — no large rounded-corner cards. */\n\n:root {\n  --space-1: 0.25rem;\n  --space-2: 0.5rem;\n  --space-3: 0.75rem;\n  --space-4: 1rem;\n  --space-5: 1.5rem;\n  --space-6: 2rem;\n  --space-7: 2.6rem;\n  --space-8: 3.5rem;\n  --space-9: 5rem;\n\n  --section-pad-y: 7rem;\n  --section-pad-x: 7vw;\n\n  --radius-sm: 6px;   /* buttons, install box */\n  --radius-md: 10px;  /* rowlist container */\n  --radius-lg: 12px;  /* terminal, status card */\n  --radius-xl: 14px;  /* grid3 container */\n\n  --shadow-terminal: inset 0 0 0 1px rgba(110, 208, 234, 0.16);\n}\n\n<\u002Fstyle>\n<script src=\"25753243-9584-49ed-90b4-60b2fe12bf72\"><\u002Fscript>\n  \n  <style>\n    html { scroll-behavior: smooth; }\n    body { margin: 0; background: #0c1322; color: #aebccd; }\n    a { color: #6ed0ea; text-decoration: none; }\n    a:hover { color: #9fdcec; }\n    /* fine blueprint grid + neural-net canvas backdrop */\n    .bp-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none;\n      background-image: linear-gradient(rgba(110,208,234,.045) 1px, transparent 1px), linear-gradient(90deg, rgba(110,208,234,.045) 1px, transparent 1px);\n      background-size: 22px 22px; }\n    #bp-net { position: fixed; inset: 0; z-index: 0; pointer-events: none; }\n    /* soft cyan aura that drifts */\n    .bp-aura { position: fixed; z-index: 0; pointer-events: none; border-radius: 50%; filter: blur(90px); }\n    @keyframes bpPulse { 0%,100% { opacity: 0.3; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1); } }\n    @keyframes bpDrift { 0%,100% { transform: translate(0,0); opacity: .5; } 50% { transform: translate(40px,-30px); opacity: .8; } }\n    @keyframes bpScan { 0% { transform: translateY(-100%); } 100% { transform: translateY(1400%); } }\n    .glow-cyan { text-shadow: 0 0 18px rgba(110,208,234,.55); }\n    .glow-node { box-shadow: 0 0 0 1px rgba(110,208,234,.5), 0 0 22px rgba(110,208,234,.35); }\n    .bp-link { transition: color .2s, text-shadow .2s; }\n    .bp-link:hover { text-shadow: 0 0 12px rgba(110,208,234,.6); }\n\n    /* ---------- mobile ---------- */\n    @media (max-width: 760px) {\n      /* collapse every multi-column grid to a single column … */\n      .bp-root [style*=\"grid-template-columns\"] { grid-template-columns: 1fr !important; gap: 1.4rem !important; }\n      /* … but keep the small metric tiles two-up (declared after, so it wins) */\n      .bp-root [style*=\"repeat(5\"], .bp-root [style*=\"repeat(4\"] { grid-template-columns: 1fr 1fr !important; gap: 0.7rem !important; }\n      /* section + hero + nav padding */\n      .bp-root [style*=\"7rem 7vw\"] { padding: 3.6rem 6vw !important; }\n      .bp-root [style*=\"6rem 7vw 6rem\"] { padding: 4.5rem 6vw 3.4rem !important; }\n      .bp-root [style*=\"7rem 7vw 5rem\"] { padding: 3.6rem 6vw 3rem !important; }\n      .bp-root [style*=\"1rem 7vw\"] { padding: 0.8rem 5vw !important; }\n      .bp-root [style*=\"2rem 7vw\"] { padding: 1.6rem 6vw !important; }\n      /* nav link cluster: wrap + shrink */\n      .bp-root nav [style*=\"gap: 2rem\"] { gap: 0.8rem !important; flex-wrap: wrap !important; justify-content: flex-end !important; row-gap: 0.5rem !important; font-size: 0.62rem !important; }\n      /* dial display type down so nothing runs off-screen */\n      .bp-root [style*=\"text-display-xl\"] { font-size: clamp(2.3rem, 11vw, 3rem) !important; }\n      .bp-root [style*=\"text-display-md\"] { font-size: 1.25rem !important; }\n      .bp-root [style*=\"text-display-lg\"] { font-size: clamp(1.7rem, 7.5vw, 2.2rem) !important; }\n      /* years timeline: stack year over entry */\n      .bp-root [style*=\"9.5rem 1fr\"] { grid-template-columns: 1fr !important; gap: 0.4rem !important; }\n      /* sticky \"Every role\" heading shouldn't pin on mobile */\n      .bp-root [style*=\"position: sticky; top: 6rem\"] { position: static !important; }\n    }\n    @media (max-width: 430px) {\n      .bp-root [style*=\"repeat(5\"], .bp-root [style*=\"repeat(4\"] { grid-template-columns: 1fr !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"bp-root\" style=\"position: relative; font-family: var(--font-sans); background: var(--aura-black); color: var(--text-body); min-height: 100vh; overflow: hidden\">\n<div class=\"bp-grid\"><\u002Fdiv>\n  <canvas id=\"bp-net\"><\u002Fcanvas>\n  <div class=\"bp-aura\" style=\"width: 520px; height: 520px; top: -120px; right: -80px; background: rgba(110,208,234,.14); animation: bpDrift 16s ease-in-out infinite\"><\u002Fdiv>\n  <div class=\"bp-aura\" style=\"width: 460px; height: 460px; bottom: 8%; left: -140px; background: rgba(194,103,76,.12); animation: bpDrift 22s ease-in-out infinite reverse\"><\u002Fdiv>\n\n  <div style=\"position: relative; z-index: 1\">\n\n    <!-- ============ NAV ============ -->\n    <nav style=\"position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 1rem 7vw; background: rgba(12,19,34,.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-default); font-family: var(--font-mono); font-size: var(--text-mono-label); letter-spacing: var(--tracking-nav); text-transform: uppercase\">\n      <a href=\"#top\" style=\"display: flex; align-items: center; gap: 0.6rem; color: var(--text-heading); text-decoration: none\">\n        <span style=\"width: 9px; height: 9px; border: 1px solid var(--aura-cyan); animation: bpPulse 1.4s ease-in-out infinite\" class=\"glow-node\"><\u002Fspan>\n        <span>DM · Systems<\u002Fspan>\n      <\u002Fa>\n      <div style=\"display: flex; gap: 2rem; align-items: center\">\n        <a href=\"#thread\" class=\"bp-link\" style=\"color: var(--text-muted)\">01 thread<\u002Fa>\n        <a href=\"#aura\" class=\"bp-link\" style=\"color: var(--text-muted)\">02 aura-code<\u002Fa>\n        <a href=\"#work\" class=\"bp-link\" style=\"color: var(--text-muted)\">03 work<\u002Fa>\n<a href=\"#years\" class=\"bp-link\" style=\"color: var(--text-muted)\">04 years<\u002Fa>\n        <a href=\"https://github.com/milodule3-debug\" aria-label=\"GitHub\" class=\"bp-link\" style=\"display: inline-flex; align-items: center; justify-content: center; color: var(--text-muted); width: 34px; height: 34px; border-radius: 4px; border: 1px solid var(--border-default)\" style-hover=\"color: var(--aura-cyan); border-color: rgba(110,208,234,.5)\">\n          <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 16 16\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n        <a href=\"#contact\" class=\"bp-link\" style=\"color: var(--aura-cyan); border: 1px solid rgba(110,208,234,.4); border-radius: 4px; padding: 0.5rem 1rem\">contact<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fnav>\n\n<!-- ============ HERO ============ -->\n    <header id=\"top\" style=\"display: flex; padding: 6rem 7vw 6rem; max-width: 1200px; margin: 0 auto; box-sizing: border-box\">\n      <div style=\"display: flex; flex-direction: column; gap: 1.4rem; max-width: 46rem\">\n        <div style=\"font-family: var(--font-mono); font-size: var(--text-mono-label); letter-spacing: 0.3em; text-transform: uppercase; color: var(--aura-cyan)\">// fig.01 — profile<\u002Fdiv>\n        <h1 style=\"font-family: var(--font-serif-display); font-size: var(--text-display-xl); font-weight: 500; line-height: var(--leading-tight); color: var(--text-heading); margin: 0\" class=\"glow-cyan\">Dušan Milosavljević<\u002Fh1>\n        <p style=\"font-family: var(--font-serif-display); font-style: italic; font-size: var(--text-display-md); color: var(--aura-cyan-dim); margin: 0; line-height: var(--leading-display)\">Understanding how systems work — then improving them.<\u002Fp>\n        <!-- node thread -->\n        <div style=\"display: flex; align-items: center; gap: 0; flex-wrap: wrap; font-family: var(--font-mono); font-size: 0.72rem; color: var(--aura-slate); margin-top: 0.4rem\">\n          <sc-for list=\"{{ threadNodes }}\" as=\"n\" hint-placeholder-count=\"5\">\n            <sc-if value=\"{{ n.arrow }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"color: var(--aura-cyan); padding: 0 0.55rem; opacity: 0.8\">→<\u002Fspan>\n            <\u002Fsc-if>\n            <span class=\"{{ n.cls }}\" style=\"{{ n.style }}\">{{ n.label }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 0.9rem; margin-top: 1rem; flex-wrap: wrap\">\n          <a href=\"#aura\" class=\"bp-link glow-node\" style=\"font-family: var(--font-mono); font-size: 0.82rem; border: 1px solid var(--aura-cyan); color: var(--aura-cyan); padding: 0.85rem 1.5rem; border-radius: 4px\"><span style=\"white-space: nowrap\">See aura-code →<\u002Fspan><\u002Fa>\n<a href=\"https://github.com/milodule3-debug\" class=\"bp-link\" style=\"display: inline-flex; align-items: center; gap: 0.55rem; font-family: var(--font-mono); font-size: 0.82rem; border: 1px solid var(--border-default); color: var(--text-muted); padding: 0.85rem 1.4rem; border-radius: 4px\" style-hover=\"color: var(--aura-cyan); border-color: rgba(110,208,234,.5)\">\n            <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 16 16\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z\"><\u002Fpath><\u002Fsvg>\n            <span style=\"white-space: nowrap\">GitHub →<\u002Fspan>\n          <\u002Fa>\n          <a href=\"uploads/Dusan-Milosavljevic-CV-Aura-Navy.pdf\" class=\"bp-link\" style=\"font-family: var(--font-mono); font-size: 0.82rem; border: 1px solid var(--border-default); color: var(--text-muted); padding: 0.85rem 1.5rem; border-radius: 4px\" style-hover=\"color: var(--aura-cyan); border-color: rgba(110,208,234,.5)\"><span style=\"white-space: nowrap\">Download CV →<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 1rem; align-items: center; margin-top: 0.6rem; font-family: var(--font-mono); font-size: var(--text-mono-body); color: var(--aura-slate-dimmer)\">\n          <span>Da Nang, Vietnam · Zrenjanin, Serbia<\u002Fspan>\n          <span style=\"color: var(--aura-cyan-dim); border: 1px solid rgba(110,208,234,.4); border-radius: 4px; padding: 0.3rem 0.7rem; font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase\" class=\"glow-node\">I don't try. I verify.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ============ 01 THREAD ============ -->\n    <section id=\"thread\" style=\"border-top: 1px solid var(--border-default); padding: 7rem 7vw; max-width: 1200px; margin: 0 auto; box-sizing: border-box\">\n      <div style=\"font-family: var(--font-mono); font-size: var(--text-mono-label); letter-spacing: 0.3em; text-transform: uppercase; color: var(--aura-cyan)\">// 01 — one thread<\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 1fr 1.6fr; gap: 4rem; margin-top: 2.4rem; align-items: start\">\n        <h2 style=\"font-family: var(--font-serif-display); font-size: var(--text-display-lg); font-weight: 500; line-height: var(--leading-display); color: var(--text-heading); margin: 0\">Not a series of career changes.<\u002Fh2>\n        <div style=\"display: flex; flex-direction: column; gap: 1.4rem; font-size: var(--text-body-md); line-height: var(--leading-body)\">\n          <p style=\"margin: 0\">I began with language as a Professor of English — learning to understand people and design learning experiences — then moved into operational systems: travel platforms, SAP ERP, logistics, and Lean manufacturing, where I saw how organizations truly function.<\u002Fp>\n          <p style=\"margin: 0\">Through Lean — PDCA, 5S — I learned to look past symptoms to root causes. Today I apply the same mindset to software and AI: reverse-engineer complex systems, understand their mechanics, and rebuild them in a more efficient form.<\u002Fp>\n          <p style=\"margin: 0; font-family: var(--font-serif-display); font-style: italic; font-size: 1.35rem; color: var(--aura-cyan-dim)\" class=\"glow-cyan\">Twenty-five years spent studying and improving different kinds of systems.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.8rem; margin-top: 4rem\">\n        <sc-for list=\"{{ threadSteps }}\" as=\"step\" hint-placeholder-count=\"5\">\n          <div style=\"background: rgba(16,26,44,.6); border: 1px solid var(--border-default); border-radius: 6px; padding: 1.2rem 1.3rem; display: flex; flex-direction: column; gap: 0.5rem\">\n            <div style=\"font-family: var(--font-mono); font-size: 0.66rem; letter-spacing: 0.18em; color: var(--aura-cyan)\">{{ step.years }}<\u002Fdiv>\n            <div style=\"font-family: var(--font-serif-display); font-size: 1.08rem; color: var(--text-heading)\">{{ step.title }}<\u002Fdiv>\n            <div style=\"font-size: 0.85rem; font-weight: 300; color: var(--text-muted)\">{{ step.lesson }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 02 FLAGSHIP ============ -->\n    <section id=\"aura\" style=\"border-top: 1px solid var(--border-default); padding: 7rem 7vw; max-width: 1200px; margin: 0 auto; box-sizing: border-box\">\n      <div style=\"font-family: var(--font-mono); font-size: var(--text-mono-label); letter-spacing: 0.3em; text-transform: uppercase; color: var(--aura-cyan)\">// 02 — flagship<\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; margin-top: 2.4rem; align-items: start\">\n        <div style=\"display: flex; flex-direction: column; gap: 1.4rem\">\n          <h2 style=\"font-family: var(--font-serif-display); font-size: var(--text-display-lg); font-weight: 500; line-height: var(--leading-display); color: var(--text-heading); margin: 0\">aura-code — an autonomous coding agent, built the lean way.<\u002Fh2>\n          <p style=\"font-size: var(--text-body-md); line-height: var(--leading-body); margin: 0\">A full agent loop with LLM streaming, tool execution, and human confirmation. Model-agnostic across five providers — Anthropic, OpenAI, Google Gemini, Xiaomi MiMo, Ollama — with multi-agent orchestration: task routing, specialist delegation, plan decomposition.<\u002Fp>\n          <p style=\"font-size: var(--text-body-md); line-height: var(--leading-body); margin: 0\">25+ integrated tools — file I/O, shell, browser, web search, email, Telegram, calendar, MCP. Published to npm, MIT licensed.<\u002Fp>\n          <div style=\"font-family: var(--font-mono); font-size: var(--text-mono-body); color: var(--aura-cyan-dim)\">TypeScript · Node.js · Express · WebSocket · Puppeteer · Vitest · GitHub Actions<\u002Fdiv>\n          <div style=\"display: flex; gap: 0.9rem; flex-wrap: wrap; margin-top: 0.4rem\">\n            <a href=\"https://www.npmjs.com/package/aura-code\" class=\"bp-link glow-node\" style=\"font-family: var(--font-mono); font-size: 0.82rem; color: var(--aura-cyan); border: 1px solid var(--aura-cyan); border-radius: 4px; padding: 0.8rem 1.4rem\"><span style=\"white-space: nowrap\">npm i -g aura-code<\u002Fspan><\u002Fa>\n            <a href=\"https://github.com/milodule3-debug\" class=\"bp-link\" style=\"font-family: var(--font-mono); font-size: 0.82rem; color: var(--text-muted); padding: 0.8rem 0.4rem\"><span style=\"white-space: nowrap\">GitHub →<\u002Fspan><\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- glowing terminal -->\n        <div style=\"position: relative\">\n          <div style=\"position: absolute; inset: -2px; border-radius: 12px; background: linear-gradient(180deg, rgba(110,208,234,.4), rgba(194,103,76,.25)); filter: blur(14px); opacity: .6\"><\u002Fdiv>\n          <div style=\"position: relative; background: var(--surface-recessed); border: 1px solid rgba(110,208,234,.4); border-radius: var(--radius-lg); padding: 1.6rem 1.8rem; font-family: var(--font-mono); font-size: 0.82rem; line-height: 1.95; overflow: hidden\">\n            <div style=\"position: absolute; left: 0; right: 0; top: 0; height: 40px; background: linear-gradient(180deg, rgba(110,208,234,.14), transparent); animation: bpScan 5.5s linear infinite; pointer-events: none\"><\u002Fdiv>\n            <div style=\"color: var(--aura-slate-dimmer); font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 0.9rem\">aura-code · session<\u002Fdiv>\n            <div style=\"color: var(--aura-cyan-dim)\">$ npm i -g aura-code<\u002Fdiv>\n            <div style=\"color: var(--accent-primary)\">aura ▸ fix the failing pipeline test<\u002Fdiv>\n            <div style=\"color: var(--aura-slate-dim)\">⟳ reading src/pipeline/steps.ts …<\u002Fdiv>\n            <div style=\"color: var(--aura-slate-dim)\">✏️ edit steps.ts — guard empty steps (line 47)<\u002Fdiv>\n            <div style=\"color: var(--aura-slate-dim)\">🧪 vitest run — 65 files<\u002Fdiv>\n            <div style=\"color: var(--aura-success-bright)\" class=\"glow-cyan\">✓ 1,031 tests passing · 0 regressions<\u002Fdiv>\n            <div style=\"color: var(--aura-cyan-dim)\">Line 47 threw when steps was empty. Guarded, verified.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- stats -->\n      <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-top: 4rem\">\n        <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"border: 1px solid var(--border-default); border-radius: 8px; padding: 1.6rem 1.4rem; text-align: center; background: rgba(16,26,44,.5)\">\n            <div style=\"font-family: var(--font-serif-display); font-size: clamp(2.2rem, 4vw, 3rem); line-height: 1; color: var(--aura-cyan)\" class=\"glow-cyan\">{{ s.value }}<\u002Fdiv>\n            <div style=\"font-family: var(--font-mono); font-size: 0.64rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--aura-slate-dim); margin-top: 0.7rem\">{{ s.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 03 WORK ============ -->\n    <section id=\"work\" style=\"border-top: 1px solid var(--border-default); padding: 7rem 7vw; max-width: 1200px; margin: 0 auto; box-sizing: border-box\">\n      <div style=\"font-family: var(--font-mono); font-size: var(--text-mono-label); letter-spacing: 0.3em; text-transform: uppercase; color: var(--aura-cyan)\">// 03 — selected work<\u002Fdiv>\n      <h2 style=\"font-family: var(--font-serif-display); font-size: var(--text-display-lg); font-weight: 500; color: var(--text-heading); margin: 2.4rem 0 0\">Systems, rebuilt in more efficient form.<\u002Fh2>\n      <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 3rem\">\n        <sc-for list=\"{{ projects }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <div style=\"background: rgba(16,26,44,.6); border: 1px solid var(--border-default); border-radius: 10px; padding: 2rem 1.8rem; display: flex; flex-direction: column; gap: 0.9rem; transition: border-color .2s, box-shadow .2s\" style-hover=\"border-color: rgba(110,208,234,.5); box-shadow: 0 0 26px rgba(110,208,234,.18)\">\n            <div style=\"font-family: var(--font-mono); font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--aura-cyan)\">{{ p.tag }}<\u002Fdiv>\n            <div style=\"font-family: var(--font-serif-display); font-size: 1.4rem; color: var(--text-heading); line-height: 1.2\">{{ p.title }}<\u002Fdiv>\n            <p style=\"margin: 0; font-size: 0.92rem; font-weight: 300; line-height: var(--leading-body); color: var(--text-body); flex: 1\">{{ p.body }}<\u002Fp>\n            <div style=\"font-family: var(--font-mono); font-size: 0.72rem; color: var(--aura-slate-dimmer)\">{{ p.meta }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 04 YEARS ============ -->\n    <section id=\"years\" style=\"border-top: 1px solid var(--border-default); padding: 7rem 7vw; max-width: 1200px; margin: 0 auto; box-sizing: border-box\">\n      <div style=\"font-family: var(--font-mono); font-size: var(--text-mono-label); letter-spacing: 0.3em; text-transform: uppercase; color: var(--aura-cyan)\">// 04 — twenty-five years<\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 1fr 1.6fr; gap: 4rem; margin-top: 2.4rem; align-items: start\">\n        <h2 style=\"font-family: var(--font-serif-display); font-size: var(--text-display-lg); font-weight: 500; line-height: var(--leading-display); color: var(--text-heading); margin: 0; position: sticky; top: 6rem\">Every role, one method.<\u002Fh2>\n        <div style=\"display: flex; flex-direction: column\">\n          <sc-for list=\"{{ roles }}\" as=\"r\" hint-placeholder-count=\"7\">\n            <div style=\"display: grid; grid-template-columns: 9.5rem 1fr; gap: 2rem; padding: 1.6rem 0; border-bottom: 1px solid var(--border-default)\">\n              <div style=\"font-family: var(--font-mono); font-size: 0.76rem; color: var(--aura-cyan); padding-top: 0.25rem\">{{ r.years }}<\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 0.35rem\">\n                <div style=\"display: flex; gap: 0.8rem; align-items: baseline; flex-wrap: wrap\">\n                  <span style=\"font-family: var(--font-serif-display); font-size: 1.25rem; color: var(--text-heading)\">{{ r.title }}<\u002Fspan>\n                  <sc-if value=\"{{ r.flag }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--aura-cyan); border: 1px solid rgba(110,208,234,.4); border-radius: 4px; padding: 0.15rem 0.5rem\" class=\"glow-node\">{{ r.flag }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"font-family: var(--font-mono); font-size: 0.76rem; color: var(--text-muted)\">{{ r.org ); font-size: 0.78rem; line-height: 1.8; color: var(--text-muted)\">{{ s.items }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display: flex; gap: 3rem; margin-top: 3rem; flex-wrap: wrap; font-family: var(--font-mono); font-size: 0.78rem; color: var(--aura-slate-dimmer)\">\n        <div>Languages — English (advanced) · Serbian (native) · German (intermediate)<\u002Fdiv>\n        <div>Certifications — Vertex AI MLOps (Google, 2026) · Elements of AI (Helsinki, 2026) · TEFL 120h · SAP ERP Superuser · Lean · PDCA · 5S<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ 06 CONTACT ============ -->\n    <section id=\"contact\" style=\"border-top: 1px solid var(--border-default); padding: 7rem 7vw 5rem; max-width: 1200px; margin: 0 auto; box-sizing: border-box; text-align: center; position: relative\">\n      <div style=\"position: absolute; top: 20%; left: 50%; transform: translateX(-50%); width: 500px; height: 300px; background: radial-gradient(circle, rgba(110,208,234,.16), transparent 70%); filter: blur(40px); pointer-events: none\"><\u002Fdiv>\n      <div style=\"position: relative\">\n        <div style=\"font-family: var(--font-mono); font-size: var(--text-mono-label); letter-spacing: 0.3em; text-transform: uppercase; color: var(--aura-cyan); white-space: nowrap\">// 06 — contact<\u002Fdiv>\n        <h2 style=\"font-family: var(--font-serif-display); font-size: var(--text-display-lg); font-weight: 500; color: var(--text-heading); margin: 2rem auto 0; max-width: 34rem; line-height: var(--leading-display)\">Have a system worth <em style=\"color: var(--aura-cyan-dim)\" class=\"glow-cyan\">improving?<\u002Fem><\u002Fh2>\n        <p style=\"margin: 1.4rem auto 0; max-width: 30rem; font-size: var(--text-body-md); line-height: var(--leading-body)\">Open to AI systems engineering roles, agent-tooling collaboration, and open-source contribution.<\u002Fp>\n        <div style=\"display: flex; gap: 0.9rem; justify-content: center; margin-top: 2.4rem; flex-wrap: wrap\">\n          <a href=\"mailto:leanproiq@gmail.com\" class=\"bp-link glow-node\" style=\"font-family: var(--font-mono); font-size: 0.82rem; background: var(--accent-primary); color: var(--aura-terracotta-deep); padding: 0.9rem 1.6rem; border-radius: 4px\"><span style=\"white-space: nowrap\">leanproiq@gmail.com →<\u002Fspan><\u002Fa>\n          <a href=\"uploads/Dusan-Milosavljevic-CV-Aura-Navy.pdf\" class=\"bp-link\" style=\"font-family: var(--font-mono); font-size: 0.82rem; border: 1px solid var(--aura-cyan); color: var(--aura-cyan); padding: 0.9rem 1.6rem; border-radius: 4px\"><span style=\"white-space: nowrap\">Download CV →<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 2rem; justify-content: center; margin-top: 2.4rem; font-family: var(--font-mono); font-size: 0.8rem; flex-wrap: wrap\">\n          <a href=\"https://github.com/milodule3-debug\" class=\"bp-link\" style=\"color: var(--text-muted)\">github.com/milodule3-debug<\u002Fa>\n          <a href=\"https://lean-progress-iq.vercel.app\" class=\"bp-link\" style=\"color: var(--text-muted)\">lean-progress-iq.vercel.app<\u002Fa>\n          <span style=\"color: var(--aura-slate-dimmer)\">+84 37 612 5323<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <footer style=\"border-top: 1px solid var(--border-default); padding: 2rem 7vw; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem; font-family: var(--font-mono); font-size: 0.72rem; color: var(--aura-slate-dimmer)\">\n      <div>Dušan Milosavljević · Da Nang, Vietnam<\u002Fdiv>\n      <div style=\"font-style: italic\">I don't try. I verify.<\u002Fdiv>\n    <\u002Ffooter>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const canvas = this.el ? this.el.querySelector('#bp-net') : document.getElementById('bp-net');\n    if (!canvas) return;\n    const ctx = canvas.getContext('2d');\n    let w, h, nodes, raf;\n    const DPR = Math.min(window.devicePixelRatio || 1, 2);\n    const spacing = 66;      // grid pitch nodes snap near\n    const link = 132;        // max edge length\n    const build = () => {\n      w = window.innerWidth; h = window.innerHeight;\n      canvas.style.width = w + 'px'; canvas.style.height = h + 'px';\n      canvas.width = w * DPR; canvas.height = h * DPR;\n      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);\n      nodes = [];\n      for (let x = spacing / 2; x < w + spacing; x += spacing) {\n        for (let y = spacing / 2; y < h + spacing; y += spacing) {\n          const jx = (Math.random() - 0.5) * spacing * 0.55;\n          const jy = (Math.random() - 0.5) * spacing * 0.55;\n          nodes.push({ x: x + jx, y: y + jy, bx: x + jx, by: y + jy,\n            ph: Math.random() * Math.PI * 2, sp: 0.4 + Math.random() * 0.6,\n            amp: 3 + Math.random() * 5, r: Math.random() < 0.14 ? 2.2 : 1.1,\n            hot: Math.random() < 0.14 });\n        }\n      }\n    };\n    const draw = (t) => {\n      ctx.clearRect(0, 0, w, h);\n      const time = t * 0.001;\n      for (const n of nodes) {\n        n.x = n.bx + Math.cos(time * n.sp + n.ph) * n.amp;\n        n.y = n.by + Math.sin(time * n.sp + n.ph) * n.amp;\n      }\n      // edges\n      for (let i = 0; i < nodes.length; i++) {\n        const a = nodes[i];\n        for (let j = i + 1; j < nodes.length; j++) {\n          const b = nodes[j];\n          const dx = a.x - b.x, dy = a.y - b.y;\n          const d = Math.hypot(dx, dy);\n          if (d < link) {\n            const base = (1 - d / link);\n            const pulse = 0.5 + 0.5 * Math.sin(time * 1.3 + (a.x + b.y) * 0.01);\n            const alpha = base * 0.22 * (0.5 + 0.5 * pulse);\n            ctx.strokeStyle = `rgba(110,208,234,${alpha.toFixed(3)})`;\n            ctx.lineWidth = 1;\n            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();\n          }\n        }\n      }\n      // nodes\n      for (const n of nodes) {\n        const glow = n.hot ? 0.6 + 0.4 * Math.sin(time * 2 + n.ph) : 0.4;\n        if (n.hot) {\n          ctx.beginPath(); ctx.arc(n.x, n.y, n.r + 4, 0, Math.PI * 2);\n          ctx.fillStyle = `rgba(110,208,234,${(glow * 0.12).toFixed(3)})`; ctx.fill();\n        }\n        ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);\n        ctx.fillStyle = n.hot ? `rgba(159,220,236,${glow.toFixed(3)})` : 'rgba(110,208,234,0.32)';\n        ctx.fill();\n      }\n      raf = requestAnimationFrame(draw);\n    };\n    build();\n    raf = requestAnimationFrame(draw);\n    this._onResize = () => build();\n    window.addEventListener('resize', this._onResize);\n    this._raf = () => raf;\n  }\n  componentWillUnmount() {\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n    if (this._raf) cancelAnimationFrame(this._raf());\n  }\n  renderVals() {\n    const nodeBase = 'font-family: var(--font-mono); padding: 0.45rem 0.75rem; border-radius: 4px; border: 1px solid var(--border-default);';\n    const nodeOn = 'font-family: var(--font-mono); padding: 0.45rem 0.75rem; border-radius: 4px; border: 1px solid var(--aura-cyan); color: var(--aura-cyan-dim);';\n    const nodeGoal = 'font-family: var(--font-mono); padding: 0.45rem 0.75rem; border-radius: 4px; border: 1px solid var(--aura-cyan); color: var(--accent-primary); background: var(--surface-recessed);';\n    return {\n      threadNodes: [\n        { label: 'Language', cls: 'glow-node', style: nodeOn },\n        { label: 'Logistics', arrow: true, cls: '', style: nodeBase },\n        { label: 'SAP ERP', arrow: true, cls: '', style: nodeBase },\n        { label: 'Lean · PDCA', arrow: true, cls: '', style: nodeBase },\n        { label: 'Software & AI', arrow: true, cls: 'glow-node', style: nodeGoal },\n      ],\n      threadSteps: [\n        { years: '2001', title: 'Language', lesson: 'Understanding people; designing learning experiences.' },\n        { years: '2001 – 13', title: 'Travel systems', lesson: 'AMADEUS · Galileo — first operational platforms.' },\n        { years: '2015 – 17', title: 'Logistics & ERP', lesson: 'SAP superuser; how organizations truly function.' },\n        { years: '2016 – 17', title: 'Lean', lesson: 'PDCA · 5S — past symptoms, to root causes.' },\n        { years: '2024 →', title: 'Software & AI', lesson: 'Reverse-engineer, understand, rebuild efficiently.' },\n      ],\n      stats: [\n        { value: '1,031', label: 'Tests passing' },\n        { value: '25+', label: 'Integrated tools' },\n        { value: '5', label: 'LLM providers' },\n        { value: '0', label: 'Open CodeQL alerts' },\n      ],\n      projects: [\n        { tag: 'Flagship · npm · MIT', title: 'aura-code', body: 'Autonomous AI coding agent. Model-agnostic — Claude, GPT, Gemini, MiMo, Ollama — with 25+ tools and multi-agent orchestration.', meta: '1,031 tests · TypeScript · npmjs.com/package/aura-code' },\n        { tag: 'Legal-tech · MLOps', title: 'Serbian Legal LLM fine-tuning', body: 'End-to-end pipeline: scraped and cleaned ~1,600 public Serbian acts (~11M words) into structured JSONL; supervised fine-tuning on Google Vertex AI (EU) — an evaluation-ready domain model for Serbian legislation.', meta: '~11M words · Vertex AI · JSONL' },\n        { tag: 'Community · Co-founder', title: 'Ris Cycling Club', body: 'Business planning and competition strategy for the Novi Sad cycling community.', meta: 'Novi Sad, Serbia' },\n      ],\n      roles: [\n        { years: '2024 – Present', title: 'Creator & Lead Developer — aura-code', org: 'Lean Progress IQ', flag: 'Flagship', body: 'Built a full agent loop with LLM streaming, tool execution, and human confirmation. Multi-agent orchestration, 25+ tools, 1,031 passing tests, clean security scan. Published to npm, MIT licensed.' },\n        { years: '2021 – Present', title: 'Online English Teacher', org: 'Learnlight', body: 'Tailored B2B English for corporate clients — presentations, negotiations, correspondence. Virtual Coach across Academy, Group, and one-to-one formats.' },\n        { years: '2015 – Present', title: 'Online English Teacher', org: 'Bibo Global Opportunity, Inc.', body: 'Lessons for intermediate and advanced students with customized lesson plans.' },\n        { years: '2017', title: 'Material & Production Planning Coordinator', org: 'Yazaki Srbija d.o.o., Šabac', body: 'SAP superuser — streamlined production and logistical operations; material flow optimization in Moldova reduced cycle time through waste elimination.' },\n        { years: '2015 – 2016', title: 'Logistics Coordinator & Supervisor', org: 'DAD Draexlmaier d.o.o.', body: 'Implemented logistics in a Greenfield investment; warehouse & E-Kanban rollout in Romania and Serbia improved FIFO flow and supply-chain visibility.' },\n        { years: '2009 – Present', title: 'Fitness Trainer & S/C Coach', org: 'Relax Fitness Studio', body: 'Trains individuals and professional athletes; tailored nutrition and lifestyle plans.' },\n        { years: '2001 – 2013', title: 'IATA Travel Agent — Sales', org: 'Milotours Air Travel Agency, Novi Sad', body: 'AMADEUS and Galileo specialist. \"Friend of Malaysia\" (Ministry of Tourism, 2005); Lufthansa Experts Sales Award (2007).' },\n      ],\n      skills: [\n        { group: 'Software development', items: 'TypeScript · Node.js · Python · Shell · Git · CI/CD' },\n        { group: 'AI, data & retrieval', items: 'LLM integration · multi-agent orchestration · MCP · RAG & Graph RAG · knowledge bases' },\n        { group: 'SAP & ERP', items: 'SAP ERP superuser · production & logistics planning' },\n        { group: 'Lean manufacturing', items: 'PDCA · 5S · waste elimination · process improvement' },\n        { group: 'Education', items: 'B2B & conversational English · curriculum design' },\n        { group: 'Tools', items: 'MS Office · AMADEUS · Galileo · GitHub · npm' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
